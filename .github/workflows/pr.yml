---
# yamllint disable rule:line-length
name: PR

on: # yamllint disable-line rule:truthy rule:comments
  pull_request:
    branches:
      - master

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Check skills
        run: |
          find "./skills" -mindepth 1 -maxdepth 1 -type d -exec uv run agentskills validate {} \;

      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd
        with:
          globs: |
            AGENTS.md
            README.md
            "skills/**/*.md"

      - name: Check python scripts
        run: uv run ruff check --output-format=github .

      - name: Check python types
        run: uv run zuban check --exclude skills/grep-app-cli

  test:
    name: Test python scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest
